name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run compile
      # Fast, host-free logic tests.
      - run: npm run test:unit
      # Integration smoke test in a real VS Code host (needs a virtual display).
      - run: xvfb-run -a npm run test:integration
