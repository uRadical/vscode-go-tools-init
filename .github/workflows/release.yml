name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Optional publish tokens — steps that need them are skipped when unset.
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run compile
      - run: npm run test:unit

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' (=$TAG) does not match package.json version ($PKG)."
            exit 1
          fi

      - name: Package VSIX
        run: npx --yes @vscode/vsce package --out "go-tools-init-${GITHUB_REF_NAME}.vsix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish --packagePath "go-tools-init-${GITHUB_REF_NAME}.vsix"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx --yes ovsx publish "go-tools-init-${GITHUB_REF_NAME}.vsix" -p "$OVSX_PAT"
